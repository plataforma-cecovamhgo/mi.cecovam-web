<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Alumnos - CECOVAM</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; }
        .header { background: #1a2a6c; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .tarea-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; text-align: left; border-left: 6px solid #27ae60; }
        .btn-descarga { background: #27ae60; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block; margin-top: 10px; }
        .btn-descarga:hover { background: #219150; }
        .info { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📚 Portal de Alumnos CECOVAM</h1>
        <p>Descarga tus materiales y tareas aquí</p>
    </div>

    <div id="lista-tareas">
        <p>Buscando tareas nuevas...</p>
    </div>
</div>

<script>
    // USAMOS TU MISMA CONFIGURACIÓN DE SIEMPRE
    const firebaseConfig = {
        apiKey: "AIzaSyDJh57e-sBDK0_8VtFn4EwFOyDDsm8v0lc",
        authDomain: "plataforma-cecovam.firebaseapp.com",
        projectId: "plataforma-cecovam",
        storageBucket: "plataforma-cecovam.firebasestorage.app",
        messagingSenderId: "655865798428",
        appId: "1:655865798428:web:625f020d553385e43d24d9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // LEER LAS TAREAS EN TIEMPO REAL
    db.collection("tareas_alumnos").orderBy("fecha", "desc").onSnapshot(snap => {
        const contenedor = document.getElementById("lista-tareas");
        if (snap.empty) {
            contenedor.innerHTML = "<p>Aún no hay tareas publicadas.</p>";
            return;
        }
        
        contenedor.innerHTML = "";
        snap.forEach(doc => {
            const t = doc.data();
            contenedor.innerHTML += `
                <div class="tarea-card">
                    <span class="info">📅 Publicado: ${t.fecha}</span>
                    <h2 style="margin: 10px 0; color: #1a2a6c;">${t.materia}</h2>
                    <p><strong>Tema:</strong> ${t.titulo}</p>
                    <p class="info">Profesor: ${t.docente}</p>
                    <a href="${t.urlArchivo}" target="_blank" class="btn-descarga">📥 DESCARGAR TAREA</a>
                </div>
            `;
        });
    });
</script>
</body>
</html>
