<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Alumnos - CECOVAM</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        :root { --azul: #1a2a6c; --rojo: #b21f1f; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2, h3 { color: var(--azul); margin-top: 0; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-azul { background: var(--azul); }
        .btn-descarga { background: #27ae60; color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; display: inline-block; font-size: 14px; margin-top: 10px; }
        #panel-alumno { display: none; }
        .material-item { background: #f9f9f9; padding: 15px; border-left: 5px solid var(--azul); border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-alumno" class="card" style="max-width: 400px; margin: 50px auto; text-align: center;">
        <h2>Portal Alumnos</h2>
        <input type="text" id="nom-alu" placeholder="Tu Nombre Completo">
        <input type="password" id="pass-alu" placeholder="Tu Clave (Matrícula)">
        <button class="btn btn-azul" onclick="autenticarAlumno()">ENTRAR AL PORTAL</button>
    </div>

    <div id="panel-alumno">
        <div class="card">
            <h2>¡Hola, <span id="nombre-alumno"></span>!</h2>
            <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer;">Cerrar Sesión</button>
        </div>

        <div class="card">
            <h3>📚 Materiales de Clase y Trabajos</h3>
            <p>Descarga aquí los archivos que tus maestros han compartido (PDF, Word, etc.)</p>
            <div id="lista-materiales">Cargando materiales...</div>
        </div>

        <div class="card" style="border-top: 5px solid var(--rojo);">
            <h3>📤 Entregar mi Actividad</h3>
            <p>Sube tu tarea resuelta para que el docente la reciba.</p>
            <input type="text" id="entregar-materia" placeholder="Materia (Ej: Matemáticas II)">
            <input type="file" id="entregar-archivo">
            <button class="btn btn-azul" id="btn-entrega" onclick="entregarTarea()">ENVIAR TAREA AL MAESTRO</button>
            <div id="historial-entregas" style="margin-top:20px; font-size: 13px; color: #555;"></div>
        </div>

        <div class="card">
            <h3>📣 Avisos Escolares</h3>
            <div id="lista-avisos">No hay avisos recientes.</div>
        </div>
    </div>
</div>

<script>
    // Configuración Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDJh57e-sBDK0_8VtFn4EwFOyDDsm8v0lc",
        authDomain: "plataforma-cecovam.firebaseapp.com",
        projectId: "plataforma-cecovam",
        storageBucket: "plataforma-cecovam.appspot.com",
        messagingSenderId: "655865798428",
        appId: "1:655865798428:web:625f020d553385e43d24d9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    let alumnoLogueado = "";

    async function autenticarAlumno() {
        const n = document.getElementById("nom-alu").value.trim();
        const c = document.getElementById("pass-alu").value.trim();
        if(!n || !c) return alert("Completa tus datos");

        const docRef = db.collection("usuarios_alumnos").doc(n);
        const res = await docRef.get();

        if(res.exists) {
            if(res.data().clave === c) loginExitoso(n);
            else alert("Clave incorrecta");
        } else {
            await docRef.set({ nombre: n, clave: c });
            loginExitoso(n);
        }
    }

    function loginExitoso(nombre) {
        alumnoLogueado = nombre;
        document.getElementById("auth-alumno").style.display = "none";
        document.getElementById("panel-alumno").style.display = "block";
        document.getElementById("nombre-alumno").innerText = nombre;
        cargarMateriales();
        cargarAvisos();
        cargarHistorialEntregas();
    }

    // CARGAR LO QUE SUBEN LOS MAESTROS
    function cargarMateriales() {
        db.collection("material_docente").orderBy("fecha", "desc").onSnapshot(snap => {
            const div = document.getElementById("lista-materiales");
            div.innerHTML = "";
            if(snap.empty) div.innerHTML = "No hay materiales publicados.";
            snap.forEach(doc => {
                const d = doc.data();
                div.innerHTML += `
                    <div class="material-item">
                        <strong>${d.materia}</strong> - ${d.titulo}<br>
                        <small>Prof: ${d.docente}</small>
                        <p style="margin:5px 0;">${d.descripcion}</p>
                        <a href="${d.archivoUrl}" target="_blank" class="btn-descarga">📥 Descargar Archivo</a>
                    </div>`;
            });
        });
    }

    // ENTREGAR TAREA
    async function entregarTarea() {
        const file = document.getElementById("entregar-archivo").files[0];
        const materia = document.getElementById("entregar-materia").value;

        if(!file || !materia) return alert("Selecciona un archivo y escribe la materia");

        const btn = document.getElementById("btn-entrega");
        btn.innerText = "Subiendo entrega...";
        btn.disabled = true;

        try {
            const ruta = entregas_alumnos/${alumnoLogueado}/${file.name};
            const ref = storage.ref(ruta);
            await ref.put(file);
            const url = await ref.getDownloadURL();

            await db.collection("actividades_alumnos").add({
                alumno: alumnoLogueado,
                materia: materia,
                nombreArchivo: file.name,
                archivoUrl: url,
                fecha: new Date().toLocaleString()
            });

            alert("¡Tarea entregada correctamente!");
            location.reload();
        } catch (e) {
            alert("Error: " + e);
            btn.disabled = false;
        }
    }

    function cargarHistorialEntregas() {
        db.collection("actividades_alumnos").where("alumno", "==", alumnoLogueado).onSnapshot(snap => {
            let h = "<strong>Tus entregas recientes:</strong><br>";
            snap.forEach(doc => {
                h += ✅ ${doc.data().materia} - ${doc.data().nombreArchivo} (${doc.data().fecha})<br>;
            });
            document.getElementById("historial-entregas").innerHTML = h;
        });
    }

    function cargarAvisos() {
        db.collection("avisos").onSnapshot(snap => {
            const div = document.getElementById("lista-avisos");
            div.innerHTML = "";
            snap.forEach(doc => {
                div.innerHTML += <div class="material-item" style="border-left-color:red;">${doc.data().mensaje}</div>;
            });
        });
    }
</script>
</body>
</html>
