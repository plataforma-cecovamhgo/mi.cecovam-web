<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - CECOVAM</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --azul: #1a2a6c; --dorado: #b8952d; --gris: #f4f7f6; --verde: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--azul); border-bottom: 2px solid var(--dorado); padding-bottom: 10px; margin-top: 0; }
        
        /* Formulario de Pagos */
        .form-pagos { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        .btn-pago { background: var(--azul); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        /* Tabla */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border: 1px solid #eee; }
        th { background: var(--azul); color: white; }
        .monto { font-weight: bold; color: var(--verde); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Centro Comunitario Valle de Mixquiahuala</h1>
        <p>Panel de Control Administrativo</p>
        <hr>
        </div>

    <div class="card" style="border-top: 5px solid var(--dorado);">
        <h2>💰 Control de Pagos y Colegiaturas</h2>
        
        <div class="form-pagos">
            <input type="text" id="pago-alumno" placeholder="Nombre del Alumno">
            <input type="text" id="pago-concepto" placeholder="Concepto (Mensualidad/Inscrip.)">
            <input type="text" id="pago-detalle" placeholder="Semestre/Bach./Esp.">
            <input type="date" id="pago-fecha">
            <input type="number" id="pago-cantidad" placeholder="Cantidad $">
            <button class="btn-pago" onclick="registrarPago()">GUARDAR</button>
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Alumno</th>
                        <th>Concepto</th>
                        <th>Nivel / Especialidad</th>
                        <th>Fecha Pago</th>
                        <th>Monto</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla-pagos">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Tu configuración de Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDJh57e-sBDK0_8VtFn4EwFOyDDsm8v0lc",
        authDomain: "plataforma-cecovam.firebaseapp.com",
        projectId: "plataforma-cecovam",
        storageBucket: "plataforma-cecovam.firebasestorage.app",
        messagingSenderId: "655865798428",
        appId: "1:655865798428:web:625f020d553385e43d24d9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Función para registrar pagos
    async function registrarPago() {
        const alumno = document.getElementById("pago-alumno").value;
        const concepto = document.getElementById("pago-concepto").value;
        const detalle = document.getElementById("pago-detalle").value;
        const fecha = document.getElementById("pago-fecha").value;
        const cantidad = document.getElementById("pago-cantidad").value;

        if(!alumno || !cantidad || !fecha) return alert("Completa: Alumno, Fecha y Cantidad");

        await db.collection("pagos").add({
            alumno: alumno,
            concepto: concepto,
            detalle: detalle,
            fecha: fecha,
            cantidad: Number(cantidad),
            creado: new Date()
        });
        
        alert("Pago registrado");
        // Limpiar solo algunos campos para rapidez
        document.getElementById("pago-alumno").value = "";
        document.getElementById("pago-cantidad").value = "";
    }

    // Escuchar pagos en tiempo real
    db.collection("pagos").orderBy("fecha", "desc").onSnapshot(snap => {
        const tabla = document.getElementById("cuerpo-tabla-pagos");
        tabla.innerHTML = "";
        snap.forEach(doc => {
            const p = doc.data();
            tabla.innerHTML += `
                <tr>
                    <td>${p.alumno}</td>
                    <td>${p.concepto}</td>
                    <td>${p.detalle}</td>
                    <td>${p.fecha}</td>
                    <td class="monto">$${p.cantidad}</td>
                </tr>
            `;
        });
    });
</script>

</body>
</html>
