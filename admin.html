<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - CECOVAM</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --azul: #1a2a6c; --dorado: #b8952d; --gris: #f4f7f6; --verde: #27ae60; --rojo: #b21f1f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: var(--azul); text-align: center; font-size: 18px; margin: 0; text-transform: uppercase; }
        h2 { color: var(--azul); border-bottom: 2px solid var(--dorado); padding-bottom: 8px; margin-top: 0; font-size: 16px; }
        .form-flex { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        input, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 6px; flex: 1; min-width: 150px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border: 1px solid #eee; font-size: 12px; }
        th { background: var(--azul); color: white; }
        .badge { padding: 3px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; color: white; }
        .btn-link { color: #27ae60; font-weight: bold; text-decoration: none; border: 1px solid #27ae60; padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>(CECOVAM) CENTRO DE ESTUDIOS COMPUTACIONALES DEL VALLE DE MÉXICO</h1>
    </div>

    <div class="card" style="border-left: 8px solid var(--rojo);">
        <h2>📢 Tablón de Avisos</h2>
        <div class="form-flex">
            <input type="text" id="titulo-aviso" placeholder="Título">
            <textarea id="texto-aviso" placeholder="Mensaje..."></textarea>
            <button class="btn" style="background: var(--rojo);" onclick="publicarAviso()">PUBLICAR</button>
        </div>
        <div id="historial-avisos"></div>
    </div>

    <div class="card">
        <h2>📂 Supervisión de Docentes y Tareas</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>Fecha</th><th>Docente</th><th>Detalle / Materia</th><th>Tipo</th><th>Archivo</th></tr>
                </thead>
                <tbody id="tabla-supervision"></tbody>
            </table>
        </div>
    </div>

    <div class="card" style="border-top: 5px solid var(--dorado);">
        <h2>💰 Control de Pagos</h2>
        <div class="form-flex">
            <input type="text" id="pago-alumno" placeholder="Alumno">
            <input type="text" id="pago-concepto" placeholder="Concepto">
            <input type="text" id="pago-detalle" placeholder="Nivel">
            <input type="date" id="pago-fecha">
            <input type="number" id="pago-cantidad" placeholder="$">
            <button class="btn" style="background: var(--azul);" onclick="registrarPago()">GUARDAR</button>
        </div>
        <table>
            <thead><tr><th>Alumno</th><th>Concepto</th><th>Fecha</th><th>Monto</th></tr></thead>
            <tbody id="tabla-pagos"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDJh57e-sBDK0_8VtFn4EwFOyDDsm8v0lc",
        authDomain: "plataforma-cecovam.firebaseapp.com",
        projectId: "plataforma-cecovam",
        storageBucket: "plataforma-cecovam.firebasestorage.app",
        messagingSenderId: "655865798428",
        appId: "1:655865798428:web:625f020d553385e43d24d9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Función universal para leer cualquier dato
    function escucharColeccion(nombreColeccion, tipo, color) {
        db.collection(nombreColeccion).onSnapshot(snap => {
            snap.forEach(doc => {
                const d = doc.data();
                const tabla = document.getElementById("tabla-supervision");
                const link = d.urlArchivo || d.archivo || d.link;
                const btn = link ? <a href="${link}" target="_blank" class="btn-link">VER TAREA</a> : "---";
                
                tabla.innerHTML += `<tr>
                    <td>${d.fecha || '---'}</td>
                    <td><b>${d.docente || d.maestro || '---'}</b></td>
                    <td>${(d.materia || d.titulo || d.actividad || '').substring(0,40)}</td>
                    <td><span class="badge" style="background:${color}">${tipo}</span></td>
                    <td>${btn}</td>
                </tr>`;
            });
        }, err => console.log("Error en " + nombreColeccion, err));
    }

    // LLAMADO A TODAS LAS POSIBILIDADES (Sin filtros para que no falle)
    escucharColeccion("tareas_alumnos", "TAREA", "#27ae60");
    escucharColeccion("material_docente", "TRABAJO", "#34495e");
    escucharColeccion("planeaciones", "PLAN", "#f39c12");
    escucharColeccion("asistencias", "LISTA", "#2980b9");

    // Lógica de Avisos
    db.collection("avisos").onSnapshot(snap => {
        const div = document.getElementById("historial-avisos");
        div.innerHTML = "";
        snap.forEach(doc => {
            const a = doc.data();
            div.innerHTML += <div style="padding:5px; border-bottom:1px solid #eee;"><b>${a.titulo}</b>: ${a.mensaje}</div>;
        });
    });

    async function publicarAviso() {
        const t = document.getElementById("titulo-aviso").value;
        const m = document.getElementById("texto-aviso").value;
        if(t && m) await db.collection("avisos").add({ titulo: t, mensaje: m, timestamp: new Date() });
    }

    // Lógica de Pagos
    async function registrarPago() {
        const al = document.getElementById("pago-alumno").value;
        const can = document.getElementById("pago-cantidad").value;
        if(al && can) {
            await db.collection("pagos").add({
                alumno: al, concepto: document.getElementById("pago-concepto").value,
                fecha: document.getElementById("pago-fecha").value,
                cantidad: Number(can), timestamp: new Date()
            });
            alert("Pago guardado");
        }
    }

    db.collection("pagos").onSnapshot(snap => {
        const t = document.getElementById("tabla-pagos");
        t.innerHTML = "";
        snap.forEach(doc => {
            const p = doc.data();
            t.innerHTML += <tr><td>${p.alumno}</td><td>${p.concepto}</td><td>${p.fecha}</td><td>$${p.cantidad}</td></tr>;
        });
    });
</script>
</body>
</html>
