<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - CECOVAM</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --azul: #1a2a6c; --dorado: #b8952d; --gris: #f4f7f6; --verde: #27ae60; --rojo: #b21f1f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: var(--azul); text-align: center; font-size: 18px; margin: 0; text-transform: uppercase; }
        h2 { color: var(--azul); border-bottom: 2px solid var(--dorado); padding-bottom: 8px; margin-top: 0; font-size: 16px; }
        
        .form-flex { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        input, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 6px; flex: 1; min-width: 150px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; text-align: left; border: 1px solid #eee; font-size: 13px; }
        th { background: var(--azul); color: white; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 10px; color: white; text-transform: uppercase; }
        .btn-descarga { background: var(--verde); color: white; text-decoration: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>(CECOVAM) CENTRO DE ESTUDIOS COMPUTACIONALES DEL VALLE DE MÉXICO</h1>
    </div>

    <div class="card" style="border-left: 8px solid var(--rojo);">
        <h2>📢 Tablón de Avisos Generales</h2>
        <div class="form-flex">
            <input type="text" id="titulo-aviso" placeholder="Título">
            <textarea id="texto-aviso" placeholder="Mensaje para la comunidad..."></textarea>
            <button class="btn" style="background: var(--rojo);" onclick="publicarAviso()">PUBLICAR</button>
        </div>
        <div id="historial-avisos" style="font-size: 12px; max-height: 80px; overflow-y: auto;"></div>
    </div>

    <div class="card">
        <h2>📂 Supervisión Docente (Tareas, Planeaciones y Asistencia)</h2>
        <div style="overflow-x: auto; max-height: 450px;">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Docente</th>
                        <th>Detalle de Actividad</th>
                        <th>Tipo</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-supervision">
                    <tr><td colspan="5" style="text-align:center;">Conectando con la base de datos...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card" style="border-top: 5px solid var(--dorado);">
        <h2>💰 Control de Pagos</h2>
        <div class="form-flex">
            <input type="text" id="pago-alumno" placeholder="Alumno">
            <input type="text" id="pago-concepto" placeholder="Concepto">
            <input type="text" id="pago-detalle" placeholder="Nivel/Especialidad">
            <input type="date" id="pago-fecha">
            <input type="number" id="pago-cantidad" placeholder="$ Cantidad">
            <button class="btn" style="background: var(--azul);" onclick="registrarPago()">GUARDAR PAGO</button>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>Alumno</th><th>Concepto</th><th>Nivel</th><th>Fecha</th><th>Monto</th></tr>
                </thead>
                <tbody id="tabla-pagos"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDJh57e-sBDK0_8VtFn4EwFOyDDsm8v0lc",
        authDomain: "plataforma-cecovam.firebaseapp.com",
        projectId: "plataforma-cecovam",
        storageBucket: "plataforma-cecovam.firebasestorage.app",
        messagingSenderId: "655865798428",
        appId: "1:655865798428:web:625f020d553385e43d24d9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. CARGAR AVISOS
    db.collection("avisos").orderBy("timestamp", "desc").onSnapshot(snap => {
        const div = document.getElementById("historial-avisos");
        div.innerHTML = "";
        snap.forEach(doc => {
            const a = doc.data();
            div.innerHTML += <div><b>${a.titulo}</b>: ${a.mensaje} <small>(${a.fecha})</small></div>;
        });
    });

    async function publicarAviso() {
        const t = document.getElementById("titulo-aviso").value;
        const m = document.getElementById("texto-aviso").value;
        if(!t || !m) return;
        await db.collection("avisos").add({ titulo: t, mensaje: m, fecha: new Date().toLocaleString(), timestamp: new Date() });
        document.getElementById("titulo-aviso").value = "";
        document.getElementById("texto-aviso").value = "";
    }

    // 2. RECUPERAR TAREAS, PLANES Y ASISTENCIAS
    function cargarHistorial() {
        const tBody = document.getElementById("tabla-supervision");
        tBody.innerHTML = "";

        // Tareas y Trabajos (Donde están los archivos para descargar)
        db.collection("tareas_alumnos").onSnapshot(snap => {
            snap.forEach(doc => {
                const d = doc.data();
                agregarFila(d.fecha, d.docente, Tarea: ${d.titulo} (${d.materia}), "TAREA", "#27ae60", d.urlArchivo);
            });
        });

        db.collection("material_docente").onSnapshot(snap => {
            snap.forEach(doc => {
                const d = doc.data();
                agregarFila(d.fecha, d.docente, d.titulo || d.nombreArchivo, "TRABAJO", "#34495e", d.urlArchivo);
            });
        });

        // Planeaciones
        db.collection("planeaciones").onSnapshot(snap => {
            snap.forEach(doc => {
                const d = doc.data();
                agregarFila(d.fecha, d.docente, ${d.materia}: ${d.contenido}, "PLANEACIÓN", "#f39c12", null);
            });
        });

        // Asistencias
        db.collection("asistencias").onSnapshot(snap => {
            snap.forEach(doc => {
                const d = doc.data();
                agregarFila(d.fecha, d.maestro || d.docente, "Pase de lista efectuado", "ASISTENCIA", "#2980b9", null);
            });
        });
    }

    function agregarFila(f, d, i, tipo, color, link) {
        const tBody = document.getElementById("tabla-supervision");
        const btn = link ? <a href="${link}" target="_blank" class="btn-descarga">Ver Archivo</a> : "---";
        tBody.innerHTML += `<tr>
            <td>${f || '--'}</td>
            <td><b>${d || 'Docente'}</b></td>
            <td>${i.substring(0,50)}...</td>
            <td><span class="badge" style="background:${color}">${tipo}</span></td>
            <td>${btn}</td>
        </tr>`;
    }

    // 3. PAGOS
    async function registrarPago() {
        const al = document.getElementById("pago-alumno").value;
        const can = document.getElementById("pago-cantidad").value;
        if(!al || !can) return alert("Faltan datos");
        await db.collection("pagos").add({
            alumno: al, concepto: document.getElementById("pago-concepto").value,
            detalle: document.getElementById("pago-detalle").value,
            fecha: document.getElementById("pago-fecha").value,
            cantidad: Number(can), timestamp: new Date()
        });
        alert("Pago guardado");
    }

    db.collection("pagos").orderBy("timestamp", "desc").onSnapshot(snap => {
        const t = document.getElementById("tabla-pagos");
        t.innerHTML = "";
        snap.forEach(doc => {
            const p = doc.data();
            t.innerHTML += <tr><td>${p.alumno}</td><td>${p.concepto}</td><td>${p.detalle}</td><td>${p.fecha}</td><td style="color:green; font-weight:bold;">$${p.cantidad}</td></tr>;
        });
    });

    cargarHistorial();
</script>
</body>
</html>
