<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo - CECOVAM</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --azul: #1a2a6c; --dorado: #b8952d; --verde: #27ae60; --rojo: #b21f1f; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h2 { color: var(--azul); text-align: center; }
        .status { text-align: center; font-weight: bold; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #e0e0e0; padding: 10px; text-align: left; font-size: 13px; }
        th { background: var(--azul); color: white; }
        .btn-ver { background: var(--verde); color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px; font-weight: bold; }
        .seccion-avisos { border-left: 5px solid var(--rojo); }
        .seccion-pagos { border-top: 5px solid var(--dorado); }
    </style>
</head>
<body>

    <div class="card">
        <h1>CECOVAM - RECUPERACIÓN DE SISTEMA</h1>
        <div id="status" class="status" style="background: #fff3cd; color: #856404;">🔌 Conectando con la base de datos...</div>
    </div>

    <div class="card seccion-avisos">
        <h2>📢 Tablón de Avisos Anteriores</h2>
        <div id="lista-avisos" style="font-size: 14px; color: #333;">Cargando avisos...</div>
    </div>

    <div class="card">
        <h2>📂 Supervisión Docente y Archivos</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Docente</th>
                        <th>Actividad / Materia</th>
                        <th>Tipo</th>
                        <th>Archivo</th>
                    </tr>
                </thead>
                <tbody id="tabla-datos"></tbody>
            </table>
        </div>
    </div>

    <div class="card seccion-pagos">
        <h2>💰 Historial de Pagos Recuperado</h2>
        <table>
            <thead>
                <tr><th>Alumno</th><th>Concepto</th><th>Fecha</th><th>Monto</th></tr>
            </thead>
            <tbody id="tabla-pagos"></tbody>
        </table>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDJh57e-sBDK0_8VtFn4EwFOyDDsm8v0lc",
        authDomain: "plataforma-cecovam.firebaseapp.com",
        projectId: "plataforma-cecovam",
        storageBucket: "plataforma-cecovam.firebasestorage.app",
        messagingSenderId: "655865798428",
        appId: "1:655865798428:web:625f020d553385e43d24d9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. CARGAR SUPERVISIÓN (TAREAS, PLANES, ASISTENCIAS)
    function cargarSupervision(coleccion, tipo, color) {
        db.collection(coleccion).get().then(snap => {
            const tabla = document.getElementById('tabla-datos');
            document.getElementById('status').innerText = "✅ CONEXIÓN EXITOSA - RECUPERANDO DATOS";
            document.getElementById('status').style.background = "#d4edda";
            document.getElementById('status').style.color = "#155724";

            snap.forEach(doc => {
                const d = doc.data();
                const link = d.urlArchivo || d.archivo || d.link || "";
                const btn = link ? <a href="${link}" target="_blank" class="btn-ver">VER ARCHIVO</a> : "---";
                
                tabla.innerHTML += `<tr>
                    <td>${d.fecha || '---'}</td>
                    <td><b>${d.docente || d.maestro || '---'}</b></td>
                    <td>${d.materia || d.titulo || d.actividad || '---'}</td>
                    <td style="color:${color}; font-weight:bold;">${tipo}</td>
                    <td>${btn}</td>
                </tr>`;
            });
        });
    }

    // 2. CARGAR AVISOS
    db.collection("avisos").get().then(snap => {
        const div = document.getElementById('lista-avisos');
        div.innerHTML = "";
        snap.forEach(doc => {
            const a = doc.data();
            div.innerHTML += <p>📌 <b>${a.titulo}</b>: ${a.mensaje} <small>(${a.fecha || ''})</small></p>;
        });
    });

    // 3. CARGAR PAGOS
    db.collection("pagos").get().then(snap => {
        const tPagos = document.getElementById('tabla-pagos');
        snap.forEach(doc => {
            const p = doc.data();
            tPagos.innerHTML += `<tr>
                <td>${p.alumno || '---'}</td>
                <td>${p.concepto || '---'}</td>
                <td>${p.fecha || '---'}</td>
                <td style="color:green; font-weight:bold;">$${p.cantidad || p.monto || '0'}</td>
            </tr>`;
        });
    });

    // Ejecutar carga total
    cargarSupervision("tareas_alumnos", "TAREA", "#27ae60");
    cargarSupervision("material_docente", "TRABAJO", "#34495e");
    cargarSupervision("planeaciones", "PLAN", "#f39c12");
    cargarSupervision("asistencias", "LISTA", "#2980b9");
</script>
</body>
</html>
