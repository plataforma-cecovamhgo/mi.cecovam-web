<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Docentes CECOVAM</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .btn { padding: 12px; border: none; border-radius: 5px; color: white; cursor: pointer; width: 45%; font-weight: bold; }
        .btn-azul { background: #1a2a6c; }
        .btn-verde { background: #27ae60; }
        #panel-docente { display: none; }
    </style>
</head>
<body>

<div id="auth-docente" class="card">
    <h2>Acceso Docentes CECOVAM</h2>
    <input type="text" id="nom-doc" placeholder="Tu Nombre">
    <input type="password" id="pass-doc" placeholder="Tu Clave">
    <div style="display: flex; justify-content: space-between;">
        <button class="btn btn-azul" onclick="iniciarSesionDocente()">INGRESAR</button>
        <button class="btn btn-verde" onclick="registrarNuevoDocente()">REGISTRARME</button>
    </div>
</div>

<div id="panel-docente" class="card">
    <h2>Bienvenido, <span id="nombre-saludo"></span></h2>
    <button onclick="location.reload()">Cerrar Sesión</button>
    <hr>
    <h3>Área de Materias</h3>
    <input type="text" id="nueva-materia" placeholder="Nombre de materia">
    <button onclick="agregarMateria()" style="width:100%; background:#1a2a6c; color:white; padding:10px; border:none; border-radius:5px;">Añadir Materia</button>
    <div id="lista-materias" style="text-align:left; margin-top:10px;"></div>
</div>

<script>
    // CONFIGURACIÓN EXACTA DE TU PROYECTO
    const firebaseConfig = {
        apiKey: "AIzaSyDJh57e-sBDK0_8VtFn4EwFOyDDsm8v0lc",
        authDomain: "plataforma-cecovam.firebaseapp.com",
        projectId: "plataforma-cecovam",
        storageBucket: "plataforma-cecovam.firebasestorage.app",
        messagingSenderId: "655865798428",
        appId: "1:655865798428:web:625f020d553385e43d24d9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function registrarNuevoDocente() {
        const n = document.getElementById("nom-doc").value.trim();
        const c = document.getElementById("pass-doc").value.trim();
        if(!n || !c) return alert("Por favor escribe nombre y clave");

        try {
            await db.collection("usuarios_docentes").doc(n).set({ nombre: n, clave: c });
            alert("¡Registro exitoso! Ya puedes entrar.");
            loginExitoso(n);
        } catch (error) {
            alert("Error de Firebase: " + error.message);
        }
    }

    async function iniciarSesionDocente() {
        const n = document.getElementById("nom-doc").value.trim();
        const c = document.getElementById("pass-doc").value.trim();
        try {
            const doc = await db.collection("usuarios_docentes").doc(n).get();
            if(doc.exists && doc.data().clave === c) {
                loginExitoso(n);
            } else {
                alert("Datos incorrectos o no estás registrado.");
            }
        } catch (error) {
            alert("Error al entrar: " + error.message);
        }
    }

    function loginExitoso(nombre) {
        document.getElementById("auth-docente").style.display = "none";
        document.getElementById("panel-docente").style.display = "block";
        document.getElementById("nombre-saludo").innerText = nombre;
    }
</script>
</body>
</html>
