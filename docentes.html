<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Docentes - CECOVAM</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        :root { --azul: #1a2a6c; --verde: #27ae60; --rojo: #b21f1f; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: var(--azul); color: white; }
        .item-viejo { background: #f9f9f9; padding: 8px; border-left: 3px solid var(--verde); margin-bottom: 5px; font-size: 13px; }
        @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card" style="display: flex; justify-content: space-between; align-items: center; background: var(--azul); color: white;">
        <h2 style="margin:0;">CECOVAM - Panel Docente</h2>
        <div>
            <span>Bienvenido: <strong id="user-name">jesus ceron</strong></span>
            <button onclick="location.reload()" style="margin-left:10px; background:var(--rojo); color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Salir</button>
        </div>
    </div>

    <div class="grid">
        <div>
            <div class="card">
                <h3>📝 Nueva Planeación</h3>
                <input type="text" id="materia-plan" placeholder="Nombre de la Materia">
                <textarea id="texto-plan" rows="5" placeholder="Escribe aquí las actividades de la semana..."></textarea>
                <button class="btn" style="background: var(--azul);" onclick="guardarPlan()">Guardar Planeación</button>
            </div>

            <div class="card">
                <h3>✅ Pase de Lista</h3>
                <textarea id="texto-lista" rows="4" placeholder="Nombres de alumnos presentes..."></textarea>
                <button class="btn" style="background: var(--verde);" onclick="guardarAsistencia()">Registrar Asistencia</button>
            </div>
        </div>

        <div>
            <div class="card">
                <h3>📂 Historial de Planeaciones</h3>
                <div id="historial-plan">Buscando datos anteriores...</div>
            </div>

            <div class="card">
                <h3>📊 Registros de Asistencia</h3>
                <div id="historial-asistencia">Cargando pases de lista...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDJh57e-sBDK0_8VtFn4EwFOyDDsm8v0lc",
        authDomain: "plataforma-cecovam.firebaseapp.com",
        projectId: "plataforma-cecovam",
        storageBucket: "plataforma-cecovam.firebasestorage.app",
        messagingSenderId: "655865798428",
        appId: "1:655865798428:web:625f020d553385e43d24d9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Función para guardar lo nuevo
    async function guardarPlan() {
        const mat = document.getElementById("materia-plan").value;
        const txt = document.getElementById("texto-plan").value;
        if(!mat || !txt) return alert("Llena los campos");
        await db.collection("planeaciones").add({
            docente: "jesus ceron", materia: mat, contenido: txt, fecha: new Date().toLocaleString()
        });
        alert("Planeación guardada");
        document.getElementById("texto-plan").value = "";
    }

    async function guardarAsistencia() {
        const lista = document.getElementById("texto-lista").value;
        if(!lista) return alert("Escribe la lista");
        await db.collection("asistencias").add({
            maestro: "jesus ceron", alumnos: lista, fecha: new Date().toLocaleDateString()
        });
        alert("Asistencia registrada");
        document.getElementById("texto-lista").value = "";
    }
