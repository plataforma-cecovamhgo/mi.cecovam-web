<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Docentes CECOVAM</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        :root { --azul: #1a2a6c; --verde: #27ae60; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 600px; margin: 20px auto; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; width: 48%; }
        .btn-azul { background: var(--azul); }
        .btn-verde { background: var(--verde); }
        #panel-docente { display: none; }
        .item-lista { background: #eee; padding: 10px; margin: 5px 0; border-radius: 4px; font-size: 14px; text-align: left; }
    </style>
</head>
<body>

<div id="auth-docente" class="card">
    <h2>Acceso Docentes CECOVAM</h2>
    <input type="text" id="nom-doc" placeholder="Nombre Completo">
    <input type="password" id="pass-doc" placeholder="Clave">
    <div style="display: flex; justify-content: space-between;">
        <button class="btn btn-azul" onclick="iniciarSesionDocente()">INGRESAR</button>
        <button class="btn btn-verde" onclick="registrarNuevoDocente()">REGISTRARME</button>
    </div>
</div>

<div id="panel-docente" class="card">
    <h2>Panel de Control</h2>
    <p>Bienvenido: <strong id="nombre-saludo"></strong></p>
    <button onclick="location.reload()" style="background:red; color:white; border:none; padding:5px 10px; cursor:pointer;">Cerrar Sesión</button>
    <hr>
    <h3>Tus Materiales Subidos</h3>
    <div id="lista-archivos-viejos">Cargando archivos previos...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDJh57e-sBDK0_8VtFn4EwFOyDDsm8v0lc",
        authDomain: "plataforma-cecovam.firebaseapp.com",
        projectId: "plataforma-cecovam",
        storageBucket: "plataforma-cecovam.firebasestorage.app",
        messagingSenderId: "655865798428",
        appId: "1:655865798428:web:625f020d553385e43d24d9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function registrarNuevoDocente() {
        const n = document.getElementById("nom-doc").value.trim();
        const c = document.getElementById("pass-doc").value.trim();
        if(!n || !c) return alert("Escribe nombre y clave");
        try {
            await db.collection("usuarios_docentes").doc(n).set({ nombre: n, clave: c });
            alert("¡Registro exitoso!");
            loginExitoso(n);
        } catch (e) { alert("Error: " + e); }
    }

    async function iniciarSesionDocente() {
        const n = document.getElementById("nom-doc").value.trim();
        const c = document.getElementById("pass-doc").value.trim();
        const doc = await db.collection("usuarios_docentes").doc(n).get();
        if(doc.exists && doc.data().clave === c) loginExitoso(n);
        else alert("Datos incorrectos.");
    }

    function loginExitoso(nombre) {
        document.getElementById("auth-docente").style.display = "none";
        document.getElementById("panel-docente").style.display = "block";
        document.getElementById("nombre-saludo").innerText = nombre;
        cargarLoQueYaHabia();
    }

    // ESTA FUNCIÓN RECUPERA TODO LO QUE BORRASTE DE LA VISTA
    function cargarLoQueYaHabia() {
        db.collection("material_docente").onSnapshot(snap => {
            const contenedor = document.getElementById("lista-archivos-viejos");
            contenedor.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                contenedor.innerHTML += `
                    <div class="item-lista">
                        <strong>${data.materia || 'Materia'}</strong>: ${data.titulo || 'Sin título'} <br>
                        <a href="${data.archivoUrl}" target="_blank">Ver archivo</a>
                    </div>`;
            });
        });
    }
</script>
</body>
</html>
