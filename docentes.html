<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Docentes CECOVAM - Recuperación de Datos</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        :root { --azul: #1a2a6c; --verde: #27ae60; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: var(--azul); color: white; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        #panel-datos { display: none; }
    </style>
</head>
<body>

<div id="login-area" class="card" style="max-width: 400px; margin: auto;">
    <h2>Acceso Docentes</h2>
    <input type="text" id="usuario" placeholder="Nombre" style="width:90%; padding:10px; margin:5px;">
    <input type="password" id="clave" placeholder="Contraseña" style="width:90%; padding:10px; margin:5px;">
    <button class="btn" style="background: var(--verde); width: 100%;" onclick="entrar()">ENTRAR AL PANEL</button>
</div>

<div id="panel-datos">
    <div class="card">
        <h1>Centro Comunitario Valle de Mixquiahuala</h1>
        <p>Docente: <strong id="user-display"></strong></p>
    </div>

    <div class="card">
        <h3>📋 Historial de Planeaciones Anteriores</h3>
        <table id="tabla-planeaciones">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Materia</th>
                    <th>Planeación / Actividad</th>
                </tr>
            </thead>
            <tbody id="cuerpo-planeaciones">
                </tbody>
        </table>
    </div>

    <div class="card">
        <h3>✅ Registro de Asistencias Previas</h3>
        <div id="lista-asistencias" style="background: #f9f9f9; padding: 15px; border-radius: 8px;">
            Cargando historial de pases de lista...
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDJh57e-sBDK0_8VtFn4EwFOyDDsm8v0lc",
        authDomain: "plataforma-cecovam.firebaseapp.com",
        projectId: "plataforma-cecovam",
        storageBucket: "plataforma-cecovam.firebasestorage.app",
        messagingSenderId: "655865798428",
        appId: "1:655865798428:web:625f020d553385e43d24d9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function entrar() {
        const user = document.getElementById('usuario').value;
        if(user) {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('panel-datos').style.display = 'block';
            document.getElementById('user-display').innerText = user;
            recuperarTodo();
        }
    }

    async function recuperarTodo() {
        // 1. Recuperar Planeaciones (buscando en la colección 'planeaciones')
        db.collection("planeaciones").orderBy("fecha", "desc").onSnapshot(snap => {
            const tabla = document.getElementById("cuerpo-planeaciones");
            tabla.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                tabla.innerHTML += `<tr>
                    <td>${d.fecha || 'S/F'}</td>
                    <td>${d.materia || 'General'}</td>
                    <td>${d.contenido || d.actividad || 'Ver detalle'}</td>
                </tr>`;
            });
        });

        // 2. Recuperar Asistencias (buscando en la colección 'asistencias')
        db.collection("asistencias").onSnapshot(snap => {
            const div = document.getElementById("lista-asistencias");
            div.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                div.innerHTML += <p>📍 <strong>${d.fecha}:</strong> ${d.alumnos || 'Registro vacío'}</p>;
            });
        });
    }
</script>
</body>
</html>
